name: Neovim Integration Test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - '**.lua'
      - 'init.lua'
      - '.github/workflows/nvim-test.yml'
  merge_group:

jobs:
  test-config:
    name: Test Config Load
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Test Config Loading
        run: |
          echo "Testing Neovim configuration loading..."
          nvim --headless --noplugin -u init.lua \
            -c "lua print('Config loaded successfully')" \
            -c "lua require('lazy').setup()" \
            -c "qa!"

      - name: Check for Lua Syntax Errors
        run: |
          echo "Checking for Lua syntax errors (parse only, no execution)..."
          fail=0
          while IFS= read -r file; do
            err=$(nvim --headless -u NONE \
              -c "lua local _, e = loadfile('$file'); if e then io.stderr:write(e..'\n'); vim.cmd('cq') end" \
              -c "qa" 2>&1)
            if [ -n "$err" ]; then
              echo "❌ $file"
              echo "$err"
              fail=1
            fi
          done < <(find lua -name "*.lua" -type f)

          if [ $fail -ne 0 ]; then
            echo "❌ Lua syntax errors found!"
            exit 1
          fi
          echo "✅ No syntax errors found"

      # Note: A "Test Plugin Manager" step that actually exercises lazy.nvim
      # would require either pre-installing plugins or bootstrapping them on
      # the runner, neither of which is currently set up. The syntax-check
      # step above already validates every Lua file parses; that is the
      # appropriate scope for this CI job.
